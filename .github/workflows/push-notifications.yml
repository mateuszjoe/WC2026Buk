name: Powiadomienia push

# Robot sprawdza nowe wiadomości czatu częściej niż wyniki meczów.
# GitHub Actions nie jest backendem realtime, więc push może mieć kilka minut opóźnienia.
on:
  schedule:
    # Nie używamy "*/5", bo pełne minuty są na GitHubie częściej opóźniane.
    # Nadal sprawdzamy co 5 minut, tylko lekko poza okrągłymi minutami.
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: push-notifications
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Zainstaluj Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Zależności robota
        run: npm install --no-audit --no-fund

      - name: Wyślij powiadomienia push
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: node scripts/send-push.mjs
