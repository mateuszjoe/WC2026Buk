<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Typer Mistrzostw Świata 2026</title>

    <!-- Ikony + instalacja jako aplikacja (PWA) — "grube baby" -->
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-180.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#0b1020" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Typer MŚ" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- styles.css z parametrem czasu (cache-busting), żeby przeglądarka nie
         trzymała starej wersji stylów po wgraniu zmian. -->
    <script>
      document.write(
        '<link rel="stylesheet" href="./styles.css?ts=' + Date.now() + '">'
      );
    </script>
    <noscript><link rel="stylesheet" href="./styles.css" /></noscript>
  </head>
  <body>
    <div id="app">
      <div class="boot">Wczytywanie typera…</div>
    </div>

    <!-- app.js to moduł ES; importuje Firebase z CDN i konfig z firebase-config.js.
         Ładujemy z parametrem czasu, żeby przeglądarka nie trzymała starej wersji
         po wgraniu zmian (cache-busting). -->
    <script type="module">
      import(`./app.js?ts=${Date.now()}`);
    </script>
  </body>
</html>
